server:
  port: 8081

spring:
  application:
    name: latent-nexus
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/latent_nexus}
    username: ${DB_USERNAME:nexus_admin}
    password: ${DB_PASSWORD:missing_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    clean-on-validation-error: true
    clean-disabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/latent-nexus}

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: latent-nexus
  admin:
    client-id: latent-nexus-backend
    client-secret: ${KEYCLOAK_CLIENT_SECRET:missing_secret}

gemini:
  api:
    key: ${GEMINI_API_KEY:missing_key}
    url:
      text: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
      embedding: https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004:embedContent

aws:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    access-key-id: ${S3_ACCESS_KEY_ID:minioadmin}
    secret-access-key: ${S3_SECRET_ACCESS_KEY:minioadmin}
    bucket-name: ${S3_BUCKET_NAME:latent-nexus}
