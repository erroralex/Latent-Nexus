server:
  port: 8081

spring:
  application:
    name: latent-nexus

  datasource:
    url: jdbc:postgresql://localhost:5432/latent_nexus
    username: ${DB_USERNAME:nexus_admin}
    password: ${DB_PASSWORD:nexus_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/latent-nexus}

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: latent-nexus
  admin:
    client-id: latent-nexus-backend
    client-secret: ${KEYCLOAK_CLIENT_SECRET:19Vx8L3LKuLsZTGhOFujcNy5MNkKg3cc}